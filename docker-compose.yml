services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: trilha-poo-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    stdin_open: true
    tty: true
    depends_on:
      - postgres
  postgres:
    image: postgres:17
    container_name: trilha-poo-pgsql
    environment:
      POSTGRES_DB: trilha_poo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: